{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link rel="stylesheet" href="{% static 'CahyaRealEstate/lenis.css' %}">
    <link rel="stylesheet" href="{% static 'CahyaRealEstate/index.css' %}">
    <link rel="stylesheet" href="{% static 'CahyaRealEstate/animations.css'  %}">
    
    <title>Cahya Real Estate - {{page_title}}</title>
</head>
<body>
    <div id="splash">
        <img src="{% static 'CahyaRealEstate/images/logo-square.png' %}" class="splash-logo">
        <p class="splash-establish-date">
            Established 2024
        </p>
    </div>

    <header id="header">
        <div class="container-fluid header-container px-5 py-3">
            <nav>
                <a href="/" class="logo-block p-3">
                    <img src="{% static 'CahyaRealEstate/images/nav-logo.png' %}">
                </a>
                <ul class="nav-list p-0 m-0">
                    <li class="nav-item">
                        <a href="{% url 'home' %}" class="nav-link mx-4" data-title="Home">home</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link mx-4" data-title="About">about</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link mx-4" data-title="Contact">contact</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link mx-4" data-title="Buy">buy</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link mx-4" data-title="Rent">rent</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link sell mx-4" data-title="Sell">sell</a>
                    </li>
                </ul>
            </nav>
            <div class="header-content">
                <h1 class="header-tagline m-0">
                    Making Dreams<br>
                    a reality<br>
                    <span>with Realty</span>
                </h1>
                <div class="header-search">
                    <form id="header-form" action="">

                    </form>
                    <p class="search-sep m-0">OR</p>
                    <div class="header-button-wrapper">
                        <a class="header-button" href="#listings">See Listings</a>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <section id="listings">
        <div class="container-xl listings-container">
            <h1 class="listings-header py-4">Featured Listings</h1>
            <div class="row listings-grid">
                {% for listing in listings %}
                <div class="listing-card col-3">
                    {{listing}}
                </div>
                {% endfor%}
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/lenis@1.0.45/dist/lenis.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="{% static 'CahyaRealEstate/JS/index.js' %}"></script>

    <script>
        const lenis = new Lenis()

        lenis.on('scroll', (e) => {
        console.log(e)
        })

        lenis.on('scroll', ScrollTrigger.update)

        gsap.ticker.add((time)=>{
        lenis.raf(time * 1000)
        })

        gsap.ticker.lagSmoothing(0)
    </script>
</body>
</html>
